<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survive the Season — Texas History Game</title>
<style>
  /* Survive the Season — Natural Texas & its first peoples. Shares the Texas
     History game family's parchment-and-ink design system (same tokens, class
     names, and components as Trail Boss / Claim the Land / Run the Blockade),
     with a woodland-bark accent and three season meters. Big tap targets,
     16px+ text, color is never the only signal (meters read by icon + number). */

  :root {
    --bg: #ece2cc;
    --card: #fbf6ea;
    --ink: #2c261b;
    --ink-soft: #6a5d47;
    --line: #d9cbab;
    --accent: #94582a;        /* woodland bark — brand */
    --accent-dark: #63380f;
    --gold: #c68a2e;          /* season sun — focus & tags */
    --food: #cf8a24;          /* 🍖 harvest amber */
    --shelter: #4e7d4a;       /* ⛺ brush green */
    --health: #bf4230;        /* ❤️ barn red */
    --green: #2e7d32; --green-soft: #e3f0e3;
    --amber: #b07d10; --amber-soft: #faf0d7;
    --red: #b3402e; --red-soft: #f7e2dc;
    --gray: #8a8a8a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at top, #f4ecd6 0%, var(--bg) 62%);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 1000px; margin: 0 auto; padding: 16px 14px 40px; min-height: 100%; }
  h1 { color: var(--accent-dark); font-size: 1.6rem; line-height: 1.2; }
  h2 { color: var(--accent-dark); font-size: 1.25rem; margin-bottom: 8px; }
  h3 { color: var(--accent-dark); font-size: 1.05rem; margin: 14px 0 6px; }
  h1:focus, h2:focus { outline: none; }
  p { margin: 6px 0; }

  .screen { animation: fadein .3s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px; margin: 14px 0;
    box-shadow: 0 1px 4px rgba(54, 45, 36, 0.1);
  }

  /* ---------- buttons & inputs ---------- */
  .btn {
    font-family: inherit; font-size: 1rem; font-weight: 600;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 12px 20px; cursor: pointer; margin: 4px 6px 4px 0; min-height: 44px;
  }
  .btn:hover, .btn:focus-visible { background: var(--accent-dark); }
  .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.big { font-size: 1.15rem; padding: 14px 26px; width: 100%; }
  .btn.secondary { background: #ecdcbe; color: var(--accent-dark); }
  .btn.secondary:hover { background: #e2cfa8; }
  .btn.ghost { background: transparent; color: var(--accent-dark); text-decoration: underline; min-height: 40px; }
  .btn.ghost:hover { background: transparent; color: var(--accent); }
  .btn-col { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }

  input[type="text"] {
    font-family: inherit; font-size: 1.1rem; padding: 12px; width: 100%;
    border: 1.5px solid #cbba98; border-radius: 10px; margin: 4px 0 14px; background: #fff; color: var(--ink);
  }
  input:focus { outline: 3px solid var(--gold); border-color: var(--accent); }
  label { font-weight: 600; color: var(--ink-soft); font-size: 0.92rem; }
  .err { color: var(--red); font-weight: 600; min-height: 1.3em; margin: 6px 0; }
  .muted { color: var(--ink-soft); font-size: 0.92rem; }
  .lead { font-size: 1.08rem; }
  .note {
    background: #fbf1d8; border: 1px solid #e6d29a; border-radius: 10px;
    padding: 12px 14px; font-size: 0.96rem; margin: 12px 0;
  }
  .center { text-align: center; }
  .app-footer { text-align: center; color: var(--ink-soft); font-size: 0.8rem; margin-top: 26px; }
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

  /* ---------- art frames (fall back to a gradient if an image is missing) ---------- */
  .art-frame {
    width: 100%; border-radius: 10px; border: 1px solid var(--line); overflow: hidden;
    background:
      radial-gradient(circle at 22% 30%, rgba(198, 138, 46, 0.4), transparent 55%),
      radial-gradient(circle at 80% 70%, rgba(148, 88, 42, 0.34), transparent 55%),
      linear-gradient(165deg, #e7d4a6, #cdb178);
  }
  .art-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-art { aspect-ratio: 16 / 7; }
  .event-art { aspect-ratio: 16 / 9; margin-bottom: 10px; }
  .result-art { aspect-ratio: 16 / 7; margin-bottom: 12px; }
  .card-art { aspect-ratio: 16 / 10; border: none; border-radius: 0; }

  /* ---------- title / how / join / wait ---------- */
  .title-screen, .how-screen, .join-screen, .wait-card, .result-screen { max-width: 660px; margin: 16px auto; }
  .pick-screen { max-width: 820px; margin: 16px auto; }
  .game-title { font-size: 2.3rem; letter-spacing: 0.01em; margin-top: 12px; color: var(--accent-dark); }
  .tagline { font-size: 1.12rem; color: var(--accent); font-weight: 700; margin: 4px 0; }
  .title-blurb { margin: 10px 0 6px; }

  .how-list { margin: 8px 0 8px 22px; }
  .how-list li { margin: 6px 0; }
  .how-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
  .how-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px; background: #fbf1de; }
  .how-card b { color: var(--accent-dark); }
  .how-card p { font-size: 0.9rem; color: var(--ink-soft); }
  .how-icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }

  .wait-card { text-align: center; }
  .pulse-dot {
    width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
    margin: 8px auto 14px; animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.15); opacity: 1; } }

  /* ---------- pick your people ---------- */
  .people-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; margin: 14px 0; }
  .people-card {
    display: flex; flex-direction: column; text-align: left; font-family: inherit; cursor: pointer;
    border: 2px solid var(--line); border-radius: 12px; background: var(--card); color: var(--ink);
    padding: 0; overflow: hidden; transition: border-color .15s, box-shadow .15s;
  }
  .people-card:hover { border-color: var(--accent); box-shadow: 0 3px 12px rgba(90, 60, 20, 0.18); }
  .people-card:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .people-card:disabled { opacity: 0.6; cursor: wait; }
  .pc-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 2px; }
  .people-name { font-size: 1.15rem; color: var(--accent-dark); font-weight: 800; }
  .people-region { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-soft); }
  .people-facts { font-size: 0.9rem; color: var(--ink-soft); margin: 4px 0 0; }
  .people-go { margin-top: 8px; font-weight: 800; color: var(--accent); }

  /* ---------- match header (season + progress) ---------- */
  .match-header { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
  .season-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f3e7c8; border: 1px solid var(--gold); color: var(--accent-dark);
    padding: 5px 14px; border-radius: 999px; font-weight: 700; font-size: 0.95rem;
    text-transform: capitalize;
  }
  .chapter-chip {
    margin-left: auto; background: #ece0c4; border: 1px solid var(--line);
    padding: 5px 12px; border-radius: 999px; font-weight: 700; color: var(--accent-dark); font-size: 0.88rem;
  }
  .progress-dots { display: flex; gap: 6px; margin: 2px 0 10px; }
  .progress-dots span { flex: 1; max-width: 46px; height: 8px; border-radius: 4px; background: #ddceac; }
  .progress-dots span.done { background: var(--accent); }
  .progress-dots span.now { background: var(--accent-dark); }

  /* ---------- meters ---------- */
  .meters { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; margin: 12px 0; }
  .meters-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft); margin-bottom: 4px; }
  .meter { display: grid; grid-template-columns: 24px 84px 1fr 34px; align-items: center; gap: 8px; margin: 7px 0; }
  .meter-icon { font-size: 1rem; }
  .meter-name { font-weight: 700; font-size: 0.92rem; }
  .meter-track { height: 14px; background: #e7dabd; border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
  .meter-track.danger { border-color: var(--red); box-shadow: 0 0 0 1px var(--red); }
  .meter-fill { height: 100%; border-radius: 999px; transition: width 0.7s ease; }
  .meter-fill.m-food { background: var(--food); }
  .meter-fill.m-shelter { background: var(--shelter); }
  .meter-fill.m-health { background: var(--health); }
  .meter-value { font-weight: 800; font-size: 0.95rem; text-align: right; }

  /* ---------- event / decision / feedback panel ---------- */
  .action-panel { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; }
  .event-kicker { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); }
  .event-card h2 { font-size: 1.4rem; margin: 2px 0 10px; }
  .event-text { font-size: 1.06rem; }
  .prompt { font-size: 1.12rem; font-weight: 600; margin-top: 4px; }

  .choice-list { display: grid; gap: 10px; margin-top: 12px; }
  .choice-btn {
    font-family: inherit; font-size: 1.02rem; text-align: left; cursor: pointer;
    border: 2px solid var(--line); border-radius: 10px; background: #fbf1de;
    padding: 13px 15px; color: var(--ink); line-height: 1.45; min-height: 44px;
  }
  .choice-btn:hover { border-color: var(--accent); background: #f6ead0; }
  .choice-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .choice-btn:disabled { opacity: 0.6; cursor: wait; }

  .verdict-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 1.1rem; font-weight: 800; padding: 8px 16px; border-radius: 999px; margin-bottom: 10px;
    border: 2px solid transparent;
  }
  .verdict-badge.right { background: var(--green-soft); color: var(--green); border-color: var(--green); }
  .verdict-badge.partial { background: var(--amber-soft); color: #7c5a0d; border-color: var(--amber); }
  .verdict-badge.wrong { background: var(--red-soft); color: var(--red); border-color: var(--red); }
  .feedback-text { font-size: 1.06rem; }
  .effects-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .effect-chip { font-size: 0.9rem; font-weight: 800; padding: 4px 10px; border-radius: 999px; }
  .effect-chip.up { background: var(--green-soft); color: var(--green); }
  .effect-chip.down { background: var(--red-soft); color: var(--red); }

  /* ---------- result / ending ---------- */
  .result-headline { font-size: 1.8rem; margin: 4px 0 12px; }
  .result-headline.win { color: var(--green); }
  .result-headline.mid { color: var(--accent); }
  .result-headline.low { color: var(--ink-soft); }
  .fall-note { font-size: 1.02rem; color: var(--ink-soft); border-left: 4px solid var(--gold); padding: 4px 0 4px 12px; margin: 10px 0; }
  .ending-block { border-left: 6px solid var(--accent); background: #fbf1de; border-radius: 8px; padding: 12px 16px; margin: 12px 0; font-size: 1.06rem; }
  .accuracy-block {
    display: flex; gap: 16px; align-items: center;
    background: var(--card); border: 2px solid var(--accent); border-radius: 12px;
    padding: 14px 18px; margin: 14px 0;
  }
  .accuracy-number { font-size: 2.6rem; font-weight: 900; color: var(--accent-dark); line-height: 1; }
  .debrief-block { background: #ece1c8; border-radius: 10px; padding: 14px 16px; margin: 12px 0; }
  .debrief { margin: 8px 0 0 20px; }
  .debrief li { margin: 8px 0; }
  .replay-nudge { text-align: center; }

  /* ---------- responsive ---------- */
  @media (max-width: 620px) {
    .how-grid { grid-template-columns: 1fr; }
    .game-title { font-size: 1.95rem; }
    .accuracy-number { font-size: 2.1rem; }
    .chapter-chip { margin-left: 0; }
    .meter { grid-template-columns: 22px 70px 1fr 30px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="live-region" class="visually-hidden" role="status" aria-live="polite"></div>

<script src="game-data.js"></script>
<script type="module">
/* ============================================================
   SURVIVE THE SEASON — game logic
   Content lives in game-data.js. This file never holds text
   students read, except tiny UI labels.
   No localStorage/sessionStorage: all game state is in memory.
   Class tracking talks to the same-origin Socket.io server
   (server.js). When no server is present (GitHub Pages, local
   file), the game silently runs in solo mode.
   ============================================================ */

const app = document.getElementById("app");
const live = document.getElementById("live-region");

const METER_INFO = [
  { key: "food",    label: "Food",    emoji: "\u{1F356}" },
  { key: "shelter", label: "Shelter", emoji: "⛺" },
  { key: "health",  label: "Health",  emoji: "❤️" }
];
const SEASON_EMOJI = { spring: "\u{1F331}", summer: "☀️", fall: "\u{1F342}", winter: "❄️" };
const VERDICT_UI = {
  right:   { cls: "right",   icon: "✓", label: "Good choice!" },
  partial: { cls: "partial", icon: "≈", label: "Partly right" },
  wrong:   { cls: "wrong",   icon: "✗", label: "Not your people's way" }
};
const VERDICT_POINTS = { right: 1, partial: 0.5, wrong: 0 };

/* ---------- state (memory only) ---------- */
let state = null;
function freshState(people) {
  return {
    people,
    seasonIndex: 0,
    decisionIndex: 0,
    meters: { food: GAME_DATA.meterStart, shelter: GAME_DATA.meterStart, health: GAME_DATA.meterStart },
    decisions: [],
    points: 0,
    failedMeter: null
  };
}

/* ---------- Classroom mode (Socket.io, same origin) ---------- */
let net = null;                 // { socket, code, studentId, approved } once joined
let studentName = "";
let waitingForApproval = false;

// The socket.io client only exists when server.js is serving this page.
// On GitHub Pages or a plain file server the script 404s → solo mode.
function loadSocketIo() {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = "/socket.io/socket.io.js";
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

function emitAck(event, payload) {
  // A cold-starting server can swallow an emit mid-handshake; without this
  // timeout the Join button would stay disabled forever with no error.
  return new Promise((resolve) =>
    net.socket.timeout(10000).emit(event, payload,
      (err, reply) => resolve(err ? { error: "The server took too long to answer. Please try again." } : reply)));
}

async function netJoin(code, name) {
  if (!net) {
    const socket = window.io();
    await new Promise((res, rej) => {
      socket.once("connect", res);
      socket.once("connect_error", rej);
      setTimeout(rej, 8000);
    });
    net = { socket, code: null, studentId: null, approved: false };
    wireNetEvents(socket);
  }
  const reply = await emitAck("student:join", { code, name });
  if (reply.error) throw new Error(reply.error);
  net.code = code;
  net.studentId = reply.studentId;
  net.approved = reply.approved;
}

function wireNetEvents(socket) {
  socket.on("student:approved", () => {
    net.approved = true;
    if (waitingForApproval) { waitingForApproval = false; screenTitle(); }
  });
  socket.on("student:removed", () => {
    net.code = net.studentId = null;
    waitingForApproval = false;
    screenJoin("Your teacher removed that name. Please pick another one.");
  });
  socket.on("session:ended", () => {
    // Teacher ended the class. If the student is mid-game, let them finish
    // in solo mode; if they were still waiting to start, send them back.
    const wasWaiting = waitingForApproval;
    net.code = net.studentId = null;
    waitingForApproval = false;
    if (wasWaiting || !state) screenJoin("Your teacher ended the class session.");
  });
  // School wifi hiccup: re-attach to our record so progress keeps saving.
  socket.io.on("reconnect", async () => {
    if (!net?.code || !net?.studentId) return;
    const r = await emitAck("student:rejoin", { code: net.code, studentId: net.studentId });
    if (r.error) { net.code = net.studentId = null; } // session gone; finish solo
  });
}

function netReport(fields) {
  if (net && net.code && net.studentId && net.socket.connected) {
    net.socket.emit("student:update", { code: net.code, studentId: net.studentId, ...fields });
  }
}

/* ---------- tiny helpers ---------- */
function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function show(node, focusSel) {
  app.replaceChildren(node);
  const f = focusSel ? node.querySelector(focusSel) : node.querySelector("h1, h2");
  if (f) { f.setAttribute("tabindex", "-1"); f.focus({ preventScroll: false }); }
  window.scrollTo(0, 0);
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function artHTML(src, alt, frameCls) {
  // A framed image; if the file is missing the frame's gradient shows through.
  if (!src) return `<div class="art-frame ${frameCls}"></div>`;
  return `<div class="art-frame ${frameCls}"><img src="${esc(src)}" alt="${esc(alt || "")}"
      onerror="this.style.display='none'"></div>`;
}
function metersHTML(m, title) {
  const rows = METER_INFO.map(mi => {
    const v = m[mi.key];
    const danger = v <= 15 ? " danger" : "";
    return `<div class="meter">
        <span class="meter-icon" aria-hidden="true">${mi.emoji}</span>
        <span class="meter-name">${mi.label}</span>
        <div class="meter-track${danger}" role="meter" aria-valuenow="${v}" aria-valuemin="0" aria-valuemax="100" aria-label="${mi.label}: ${v} of 100">
          <div class="meter-fill m-${mi.key}" style="width:${v}%"></div>
        </div>
        <span class="meter-value">${v}</span>
      </div>`;
  }).join("");
  return `<div class="meters" role="group" aria-label="Your resources">${title ? `<div class="meters-title">${esc(title)}</div>` : ""}${rows}</div>`;
}
function effectsRowHTML(before, after) {
  const chips = METER_INFO.map(mi => {
    const diff = after[mi.key] - before[mi.key];
    if (diff === 0) return "";
    const cls = diff > 0 ? "up" : "down";
    const sign = diff > 0 ? "+" : "";
    return `<span class="effect-chip ${cls}">${mi.emoji} ${mi.label} ${sign}${diff}</span>`;
  }).filter(Boolean).join("");
  return chips ? `<div class="effects-row">${chips}</div>` : "";
}
function headerHTML(s) {
  return `<div class="match-header">
      <span class="season-chip">${SEASON_EMOJI[s.key]} ${esc(s.key)}</span>
      <span class="chapter-chip">Season ${state.seasonIndex + 1} of 4</span>
    </div>` + dotsHTML(state.seasonIndex);
}
function dotsHTML(seasonIndex) {
  return `<div class="progress-dots" aria-label="Season ${seasonIndex + 1} of 4">` +
    [0,1,2,3].map(i => `<span class="${i < seasonIndex ? "done" : i === seasonIndex ? "now" : ""}"></span>`).join("") + `</div>`;
}
function footerHTML() {
  return `<footer class="app-footer">Made for 7th Grade Texas History &middot; TEKS 7.2A, 7.9A</footer>`;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const BAD_WORDS = ["fuck","shit","bitch","cunt","dick","cock","pussy","nigg","fag","whore","slut","penis","vagina","boob","sex "];
function nameLooksOk(n) {
  const low = " " + n.toLowerCase() + " ";
  return !BAD_WORDS.some(w => low.includes(w));
}

/* ============================================================
   SCREENS
   ============================================================ */

/* ---------- Join (classroom mode) ---------- */
function screenJoin(err = "") {
  const node = el(`<div class="screen">
    <div class="card title-screen">
      ${artHTML("assets/images/title_hero.jpg", "Early Texas at dawn: tall prairie grass, distant hills, golden light.", "hero-art")}
      <h1 class="game-title">Survive the Season</h1>
      <p class="tagline">Live a whole year the way Texas's first peoples really did.</p>
    </div>
    <div class="card join-screen">
      <h2>Join your class</h2>
      <label for="join-code">Class code (from your teacher)</label>
      <input type="text" id="join-code" autocomplete="off" autocapitalize="characters" maxlength="10" placeholder="TX-????">
      <label for="join-name">Pick the name your teacher will see</label>
      <input type="text" id="join-name" autocomplete="off" maxlength="24" placeholder="First name + last initial">
      <p class="err" role="alert">${esc(err)}</p>
      <div class="btn-col">
        <button class="btn big" id="join-btn">Join Class</button>
        <button class="btn ghost" id="solo-btn">Practice without a class code</button>
      </div>
    </div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#join-btn").addEventListener("click", async () => {
    const code = node.querySelector("#join-code").value.trim().toUpperCase();
    const name = node.querySelector("#join-name").value.trim();
    if (!code) return showErr("Please type your class code.");
    if (name.length < 2) return showErr("Please pick a name (at least 2 letters).");
    if (!nameLooksOk(name)) return showErr("Please pick a different name.");
    const btn = node.querySelector("#join-btn");
    btn.disabled = true; btn.textContent = "Joining…";
    try {
      await netJoin(code, name);
      studentName = name;
      if (!net.approved) screenWaiting();
      else screenTitle();
    } catch (e) {
      btn.disabled = false; btn.textContent = "Join Class";
      showErr(e && e.message ? e.message : "Couldn't connect. Check your internet and try again.");
    }
  });
  node.querySelector("#solo-btn").addEventListener("click", () => {
    if (net) { net.code = net.studentId = null; }
    screenTitle();
  });
  function showErr(msg) { node.querySelector(".err").textContent = msg; }
  show(node, ".game-title");
}

function screenWaiting() {
  const node = el(`<div class="screen">
    <div class="card wait-card">
      <div class="pulse-dot" aria-hidden="true"></div>
      <h2>Hi, ${esc(studentName)}!</h2>
      <p class="lead">Waiting for your teacher to approve your name&hellip;</p>
      <p class="muted">The game will start by itself when your teacher says OK.</p>
    </div>
    ${footerHTML()}
  </div>`);
  show(node);
  waitingForApproval = true;
}

/* ---------- Title / How to play ---------- */
function screenTitle() {
  const node = el(`<div class="screen">
    <div class="card title-screen">
      ${artHTML("assets/images/title_hero.jpg", "Early Texas at dawn: tall prairie grass, distant hills, golden light.", "hero-art")}
      <h1 class="game-title">Survive the Season</h1>
      <p class="tagline">Four peoples. Four wild lands. One whole year.</p>
      <p class="title-blurb">Texas, long ago &mdash; before Europeans arrived. Four peoples live in four very different lands. Can you live a whole year the way they really did?</p>
      <div class="btn-col">
        <button class="btn big" id="start">Start</button>
      </div>
    </div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#start").addEventListener("click", screenHowTo);
  show(node, ".game-title");
}

function screenHowTo() {
  const node = el(`<div class="screen">
    <div class="card how-screen">
      <h2>How to Play</h2>
      <ol class="how-list">
        <li><b>Pick one of the four early Texas peoples.</b></li>
        <li><b>Live through four seasons</b> — Spring, Summer, Fall, and Winter. Each season brings <b>two big choices</b>.</li>
      </ol>
      <h3>Watch your three meters</h3>
      <div class="how-grid">
        <div class="how-card"><span class="how-icon" aria-hidden="true">\u{1F356}</span><b>Food</b><p>Enough to eat through the year.</p></div>
        <div class="how-card"><span class="how-icon" aria-hidden="true">⛺</span><b>Shelter</b><p>A home that fits your land.</p></div>
        <div class="how-card"><span class="how-icon" aria-hidden="true">❤️</span><b>Health</b><p>Your people, safe and strong.</p></div>
      </div>
      <p class="muted">They start at ${GAME_DATA.meterStart}. If any meter hits 0, the year ends early.</p>
      <div class="note"><b>Here's the secret:</b> the <i>right</i> choice depends on <i>your people's land</i>. What saves one people can sink another!</div>
      <div class="btn-col"><button class="btn big" id="go">Choose Your People</button></div>
    </div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#go").addEventListener("click", screenChoosePeople);
  show(node);
}

/* ---------- Choose people ---------- */
function screenChoosePeople() {
  const cards = GAME_DATA.peoples.map(p => `
    <button class="people-card" data-id="${p.id}">
      ${artHTML(p.cardImage, `${p.name} people in their home region: ${p.region}.`, "card-art")}
      <div class="pc-body">
        <span class="people-name">${esc(p.name)}</span>
        <span class="people-region">${esc(p.region)}</span>
        <p class="people-facts"><b>Home:</b> ${esc(p.home)} &middot; <b>Main food:</b> ${esc(p.food)}</p>
        <span class="people-go">Live as the ${esc(p.name)} →</span>
      </div>
    </button>`).join("");
  const node = el(`<div class="screen">
    <div class="pick-screen">
      <h2>Choose Your People</h2>
      <p class="muted">Each people lived in a different part of Texas. Their land shaped everything they did.</p>
      <div class="people-grid">${cards}</div>
    </div>
    ${footerHTML()}
  </div>`);
  node.querySelectorAll(".people-card").forEach(btn => {
    btn.addEventListener("click", () => {
      const p = GAME_DATA.peoples.find(x => x.id === btn.dataset.id);
      state = freshState(p);
      netReport({ tribe: p.id, status: "in_progress" });
      screenPeopleIntro();
    });
  });
  show(node);
}

function screenPeopleIntro() {
  const p = state.people;
  const node = el(`<div class="screen">
    <div class="action-panel event-card">
      <div class="event-kicker">Your people</div>
      <h2>The ${esc(p.name)}</h2>
      ${artHTML(p.cardImage, `${p.name} people in their home region: ${p.region}.`, "event-art")}
      <p class="event-text">${esc(p.intro)}</p>
    </div>
    ${metersHTML(state.meters, "Your resources — start of the year")}
    <div class="btn-col"><button class="btn big" id="go">Begin the Year</button></div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#go").addEventListener("click", screenSeasonIntro);
  show(node);
}

/* ---------- Season loop ---------- */
function currentSeason() { return state.people.seasons[state.seasonIndex]; }

function screenSeasonIntro() {
  const s = currentSeason();
  const node = el(`<div class="screen">
    ${headerHTML(s)}
    <div class="action-panel event-card">
      <div class="event-kicker">${SEASON_EMOJI[s.key]} ${esc(s.key)}</div>
      <h2>${esc(s.title)}</h2>
      ${artHTML(s.image, s.alt, "event-art")}
      <p class="event-text">${esc(s.intro)}</p>
    </div>
    ${metersHTML(state.meters)}
    <div class="btn-col"><button class="btn big" id="go">Continue</button></div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#go").addEventListener("click", screenDecision);
  show(node);
}

function screenDecision() {
  const s = currentSeason();
  const d = s.decisions[state.decisionIndex];
  const options = shuffle(d.choices.map((c, i) => ({ c, i })));
  const node = el(`<div class="screen">
    ${headerHTML(s)}
    ${metersHTML(state.meters)}
    <div class="action-panel">
      <div class="event-kicker">${SEASON_EMOJI[s.key]} ${esc(s.key)} &middot; Choice ${state.decisionIndex + 1} of 2</div>
      <p class="prompt">${esc(d.prompt)}</p>
      <div class="choice-list" id="choices"></div>
    </div>
    ${footerHTML()}
  </div>`);
  const box = node.querySelector("#choices");
  options.forEach(({ c }) => {
    const b = el(`<button class="choice-btn">${esc(c.text)}</button>`);
    b.addEventListener("click", () => applyChoice(c));
    box.appendChild(b);
  });
  show(node);
}

function applyChoice(choice) {
  const before = { ...state.meters };
  for (const [k, v] of Object.entries(choice.effects)) {
    state.meters[k] = Math.max(0, Math.min(100, state.meters[k] + v));
  }
  const pts = VERDICT_POINTS[choice.verdict];
  state.points += pts;
  const s = currentSeason();
  state.decisions.push({ season: s.key, n: state.decisionIndex + 1, verdict: choice.verdict, points: pts });
  netReport({ decisions: state.decisions, pointsEarned: state.points });

  const failed = METER_INFO.find(mi => state.meters[mi.key] <= 0);
  if (failed) state.failedMeter = failed.key;

  live.textContent = METER_INFO.map(mi => `${mi.label} is now ${state.meters[mi.key]}`).join(", ");
  screenFeedback(choice, before);
}

function screenFeedback(choice, before) {
  const v = VERDICT_UI[choice.verdict];
  const nextLabel = state.failedMeter ? "See what happened"
    : state.decisionIndex === 0 ? "Next choice" : "Finish the season";
  const node = el(`<div class="screen">
    <div class="action-panel">
      <div class="verdict-badge ${v.cls}"><span aria-hidden="true">${v.icon}</span> ${v.label}</div>
      <p class="feedback-text">${esc(choice.feedback)}</p>
      ${effectsRowHTML(before, state.meters) || `<p class="muted">No meter change.</p>`}
    </div>
    ${metersHTML(state.meters)}
    <div class="btn-col"><button class="btn big" id="go">${nextLabel}</button></div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#go").addEventListener("click", () => {
    if (state.failedMeter) return screenEnding("failed");
    if (state.decisionIndex === 0) { state.decisionIndex = 1; screenDecision(); }
    else screenSeasonSummary();
  });
  show(node, ".verdict-badge");
}

function screenSeasonSummary() {
  const s = currentSeason();
  const vals = METER_INFO.map(mi => state.meters[mi.key]);
  const lowest = Math.min(...vals);
  const line = lowest >= 70 ? "Your people are doing very well. The land is providing."
    : lowest >= 45 ? "You're holding on. Keep choosing your people's way."
    : "It's getting hard. Your next choices really matter.";
  const isWinter = state.seasonIndex === 3;
  const node = el(`<div class="screen">
    ${headerHTML(s)}
    <div class="action-panel">
      <div class="event-kicker">${SEASON_EMOJI[s.key]} ${esc(s.key)} complete</div>
      <h2>End of ${esc(s.key.charAt(0).toUpperCase() + s.key.slice(1))}</h2>
      <p class="event-text">${line}</p>
    </div>
    ${metersHTML(state.meters)}
    <div class="btn-col"><button class="btn big" id="go">${isWinter ? "See how your year ends" : "On to " + nextSeasonName()}</button></div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#go").addEventListener("click", () => {
    if (isWinter) {
      const allHigh = METER_INFO.every(mi => state.meters[mi.key] >= 60);
      screenEnding(allHigh ? "thrived" : "survived");
    } else {
      state.seasonIndex += 1;
      state.decisionIndex = 0;
      screenSeasonIntro();
    }
  });
  show(node);
}
function nextSeasonName() {
  const k = state.people.seasons[state.seasonIndex + 1].key;
  return k.charAt(0).toUpperCase() + k.slice(1);
}

/* ---------- Endings ---------- */
function screenEnding(kind) {
  const p = state.people;
  const accuracy = Math.round((state.points / GAME_DATA.totalDecisions) * 100);
  netReport({
    status: "completed",
    accuracy,
    pointsEarned: state.points,
    decisions: state.decisions
  });

  let title, text, tier;
  if (kind === "thrived") { title = GAME_DATA.endings.thrived.title; text = GAME_DATA.endings.thrived.text; tier = "win"; }
  else if (kind === "survived") { title = GAME_DATA.endings.survived.title; text = GAME_DATA.endings.survived.text; tier = "mid"; }
  else {
    const mi = METER_INFO.find(m => m.key === state.failedMeter);
    title = "The Year Was Too Hard";
    text = `Your ${mi.label.toLowerCase()} ${mi.emoji} ran out. ` + GAME_DATA.endings.failed[state.failedMeter];
    tier = "low";
  }
  const debrief = p.debrief.map(li => `<li>${esc(li)}</li>`).join("");
  const node = el(`<div class="screen">
    <div class="card result-screen">
      <div class="event-kicker">The ${esc(p.name)} &middot; end of the year</div>
      <h1 class="result-headline ${tier}">${esc(title)}</h1>
      ${artHTML(currentSeason().image, `${p.name} people at the end of the year.`, "result-art")}
      <div class="ending-block"><p>${esc(text)}</p></div>

      <div class="accuracy-block">
        <div class="accuracy-number">${accuracy}%</div>
        <div>
          <b>How well your choices matched the ${esc(p.name)} way of life.</b>
          <p class="muted">This is the score your teacher sees — how often you chose what really fit your people's land.</p>
        </div>
      </div>

      ${metersHTML(state.meters, "Where your year ended")}

      <div class="debrief-block">
        <h3>How the ${esc(p.name)} really survived the seasons</h3>
        <ul class="debrief">${debrief}</ul>
      </div>

      <div class="btn-col">
        <button class="btn big" id="replay">Play Again — Choose Another People</button>
        <p class="replay-nudge muted">${esc(GAME_DATA.endings.replayNudge)}</p>
      </div>
    </div>
    ${footerHTML()}
  </div>`);
  node.querySelector("#replay").addEventListener("click", () => {
    state = null;
    screenChoosePeople();
  });
  show(node, ".result-headline");
}

/* ---------- boot ---------- */
loadSocketIo().then((hasServer) => {
  if (hasServer) screenJoin();
  else screenTitle(); // solo mode: no session server behind this page
});
</script>
</body>
</html>
